name: 世界杯日历定时更新

on:
  schedule:
    # 每 30 分钟检查一次是否需要运行监控（UTC 时区）
    # 将在 :00 和 :30 分时自动触发
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm install

      - name: 检查是否需要运行监控
        id: check_schedule
        run: |
          # 读取下次计划检查时间
          if [ -f .state/tracker.json ]; then
            NEXT_CHECK=$(jq -r '.nextScheduledCheck // "2026-01-01T00:00:00Z"' .state/tracker.json)
          else
            # 如果文件不存在，立即运行
            NEXT_CHECK="1970-01-01T00:00:00Z"
          fi

          # 获取当前 UTC 时间
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "当前时间: $NOW"
          echo "下次检查: $NEXT_CHECK"

          # 比较时间，如果当前时间 >= 下次检查时间，则需要运行
          if [[ "$NOW" > "$NEXT_CHECK" ]] || [[ "$NOW" == "$NEXT_CHECK" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ 到达检查时间，开始监控"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏳ 等待下次检查时间"
          fi

      - name: 运行比赛监控
        if: steps.check_schedule.outputs.should_run == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
          SEASON_YEAR: 2026
          CACHE_DURATION_HOURS: 24
        run: npm run monitor

      - name: 检查更改
        id: check_changes
        if: steps.check_schedule.outputs.should_run == 'true'
        run: |
          if git diff --quiet WorldCupSchedule.ics; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 配置 Git 用户
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: 提交和推送更改
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add WorldCupSchedule.ics .state/tracker.json
          git commit -m "chore: 自动更新世界杯赛程和比赛数据"
          git remote set-url origin https://github-actions[bot]:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: GitHub Action
          GIT_AUTHOR_EMAIL: action@github.com
          GIT_COMMITTER_NAME: GitHub Action
          GIT_COMMITTER_EMAIL: action@github.com

      - name: 输出下次检查时间
        if: steps.check_schedule.outputs.should_run == 'true'
        run: |
          if [ -f .state/tracker.json ]; then
            jq '.nextScheduledCheck' .state/tracker.json
          fi

