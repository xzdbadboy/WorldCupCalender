name: 世界杯日历定时更新

on:
  schedule:
    # 每 20 分钟检查一次 FIFA 数据（UTC 时区）
    - cron: '*/20 * * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm install

      - name: 运行比赛监控
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SEASON_YEAR: 2026
          CACHE_DURATION_HOURS: 24
        run: npm run monitor

      - name: 检查更改
        id: check_changes
        run: |
          if git diff --quiet WorldCupSchedule.ics; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 配置 Git 用户
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: 提交和推送更改
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add WorldCupSchedule.ics .state/tracker.json
          git commit -m "chore: 自动更新世界杯赛程和比赛数据"
          git remote set-url origin https://github-actions[bot]:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: GitHub Action
          GIT_AUTHOR_EMAIL: action@github.com
          GIT_COMMITTER_NAME: GitHub Action
          GIT_COMMITTER_EMAIL: action@github.com
